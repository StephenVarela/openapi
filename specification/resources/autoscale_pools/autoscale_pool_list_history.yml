operationId: autoscale_pools_list_history

summary: List history events

description: |
  To list all Autoscale Pools in your account, send a GET request to `/v2/droplets/autoscale/$AUTOSCALE_POOL_ID/history`.

  The response body will be a JSON object with a key of `history`. This will be
  set to an array containing objects each representing a history event. 

tags:
  - Autoscale Pools

parameters:
  - $ref: '../../shared/parameters.yml#/per_page'
  - $ref: '../../shared/parameters.yml#/page'

responses:
  '200':
    $ref: 'responses/all_autoscale_pools.yml'

  '401':
    $ref: '../../shared/responses/unauthorized.yml'

  '429':
    $ref: '../../shared/responses/too_many_requests.yml'

  '500':
    $ref: '../../shared/responses/server_error.yml'

  default:
    $ref: '../../shared/responses/unexpected_error.yml'

x-codeSamples:
  - $ref: 'examples/curl/autoscale_pools_list.yml'


security:
  - bearer_auth:
    - 'droplet:read'
