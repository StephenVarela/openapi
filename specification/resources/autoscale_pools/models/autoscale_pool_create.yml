type: object

properties:
  name: 
    example: "my-autoscaler-group"
    type: string
    description: "human readable name of the autoscaler group"
  config:
    oneOf:
      - $ref: ../models/autoscale_pool_static_config.yml
      - $ref: ../models/autoscale_pool_dynamic_config.yml
    type: object
    description: Config is the scaling configuration for an autoscale pool. 
      there are 2 types of scaling configuration, static and dynamic.
      static requires specifying a target number of instances whereas dynamic
      requires min, max, target utilizations and a cool down period
  droplet_template:    
    $ref: ../models/autoscale_pool_droplet_template.yml
    type: object
    description: this template is used to create all of the droplets in the pool
      with the specified attributes
